{% extends 'Admin/Header.html' %}
{% block content %}
<head>
    <title>Reply</title>
</head>
<div class="page-wrapper">
    <div class="page-body">

        <!-- ===== PAGE HEADER ===== -->
        <div class="row mb-4">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="ti-comment-alt"></i> Reply to Complaint
                        </h4>
                        <small>Send response to user complaint</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== REPLY FORM ===== -->
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="ti-pencil"></i> Admin Reply
                        </h5>
                    </div>

                    <div class="card-body">
                        <form action="" method="POST">
                            {% csrf_token %}

                            <div class="form-group">
                                <label for="txt_reply">
                                    <strong>Reply Message</strong>
                                </label>
                                <textarea name="txt_reply"
                                          id="txt_reply"
                                          class="form-control"
                                          rows="5"
                                          placeholder="Type your reply here..."
                                          required></textarea>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-success">
                                    <i class="ti-check"></i> Submit Reply
                                </button>
                                <a href="{% url 'Admin:ViewComplaint' %}" 
                                   class="btn btn-secondary ml-2">
                                    <i class="ti-arrow-left"></i> Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location = "{% url 'Admin:ViewComplaint' %}";
</script>
{% endif %}

{% endblock %}
