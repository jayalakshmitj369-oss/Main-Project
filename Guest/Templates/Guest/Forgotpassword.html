{% load static %}
{% block content %}
<head>
    <title>Forgot Password</title>
</head>

<style>
/* ===== FULL PAGE BACKGROUND ===== */
.artist-forgot-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f472b6, #3b82f6);
    font-family: 'Poppins', sans-serif;
    padding: 20px;
}

/* ===== CARD ===== */
.artist-forgot-card {
    background: rgba(0, 0, 0, 0.85);
    padding: 50px 40px;
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 50px rgba(0,0,0,0.7);
    text-align: center;
    color: #fff;
}

/* ===== TITLE ===== */
.artist-forgot-title {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 30px;
    color: #f472b6;
    text-shadow: 0 0 15px rgba(244,114,182,0.6);
}

/* ===== INPUT ===== */
.artist-forgot-input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

/* ===== BUTTON ===== */
.artist-forgot-btn {
    width: 100%;
    padding: 14px;
    background: #f472b6;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

.artist-forgot-btn:hover {
    background: #e11d48;
}

/* ===== BACK LINK ===== */
.artist-back-login {
    display: block;
    margin-top: 20px;
    color: #93c5fd;
    text-decoration: none;
    font-weight: 500;
}

.artist-back-login:hover {
    text-decoration: underline;
}
</style>

<div class="artist-forgot-page">
    <div class="artist-forgot-card">
        <h1 class="artist-forgot-title">Forgot Password</h1>

        <form action="" method="post">
            {% csrf_token %}
            <input type="email" name="txt_email" placeholder="Enter your email" required class="artist-forgot-input">
            <input type="submit" value="Send OTP" class="artist-forgot-btn">
        </form>

        <a href="{% url 'Guest:Login' %}" class="artist-back-login">
            ← Back to Login
        </a>
    </div>
</div>

{% if msg %}
<script>
    alert("OTP is sent to {{ msg }}");
    window.location = "{% url 'Guest:Otp' %}";
</script>
{% endif %}

{% endblock %}
