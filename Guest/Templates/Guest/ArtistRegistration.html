{% extends 'Guest/Header.html' %}
{% block content %}

<head>
    <title>Artist Registration</title>
</head>

<style>
/* ===== FULL PAGE ARTISTIC BACKGROUND ===== */
.artist-reg-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: linear-gradient(135deg, #f472b6, #3b82f6, #facc15);
    font-family: 'Poppins', sans-serif;
    padding: 50px 20px;
}

/* ===== REGISTRATION CARD ===== */
.artist-reg-card {
    background: rgba(0,0,0,0.85);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 750px;
    width: 100%;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
    color: #fff;
}

/* ===== TITLE ===== */
.artist-reg-title {
    text-align: center;
    font-size: 32px;
    margin-bottom: 35px;
    color: #f472b6;
    text-shadow: 0 0 10px #3b82f6;
    font-weight: 700;
}

/* ===== FORM ROW ===== */
.form-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
}

.form-row label {
    min-width: 140px;
    font-size: 15px;
    font-weight: 500;
    color: #f472b6;
    text-shadow: 0 0 6px #3b82f6;
}

/* ===== INPUTS ===== */
.artist-reg-input,
.artist-reg-textarea,
.artist-reg-select {
    flex: 1;
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    transition: 0.3s;
}

.artist-reg-input:focus,
.artist-reg-textarea:focus,
.artist-reg-select:focus {
    box-shadow: 0 0 10px #f472b6;
}

/* ===== PASSWORD FIX ===== */
.password-wrapper {
    position: relative;
    width: 100%;
}

.password-wrapper .artist-reg-input {
    width: 100%;
}

.show-password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #f472b6;
}

/* ===== SUBMIT BUTTON ===== */
.artist-reg-submit-btn {
    width: 100%;
    padding: 14px;
    margin-top: 30px;
    border-radius: 50px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #0ff, #f0f);
    color: #000;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(0,255,255,0.7);
}

.artist-reg-submit-btn:hover {
    background: linear-gradient(90deg, #f0f, #0ff);
    box-shadow: 0 0 25px rgba(0,255,255,0.9);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
        align-items: flex-start;
    }

    .form-row label {
        margin-bottom: 6px;
    }
}
</style>

<div class="artist-reg-page">
    <div class="artist-reg-card">
        <h2 class="artist-reg-title">Artist Registration</h2>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-row">
                <label>Name</label>
                <input type="text" name="txt_name" placeholder="Enter Name" required
                       pattern="^[A-Z]+[a-zA-Z ]*$"
                       title="First letter capital, alphabets only"
                       class="artist-reg-input">
            </div>

            <div class="form-row">
                <label>Email</label>
                <input type="email" name="txt_email" placeholder="Enter Email"
                       required class="artist-reg-input">
            </div>

            <div class="form-row">
                <label>Contact</label>
                <input type="text" name="txt_contact" placeholder="Enter Contact number"
                       required class="artist-reg-input">
            </div>

            <div class="form-row">
                <label>Address</label>
                <textarea name="txt_address" placeholder="Enter Address"
                          required class="artist-reg-textarea"></textarea>
            </div>

            <div class="form-row">
                <label>District</label>
                <select name="sel_district" id="sel_district"
                        required class="artist-reg-select">
                    <option value="">----- Select District -----</option>
                    {% for i in districtDatas %}
                    <option value="{{i.id}}">{{i.district_name}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Place</label>
                <select name="sel_place" id="sel_place"
                        required class="artist-reg-select">
                    <option value="">----- Select Place -----</option>
                </select>
            </div>

            <div class="form-row">
                <label>Photo</label>
                <input type="file" name="file_photo"
                       accept="image/*" required
                       class="artist-reg-input">
            </div>

            <div class="form-row">
                <label>Proof</label>
                <input type="file" name="file_proof"
                       accept="image/*" required
                       class="artist-reg-input">
            </div>

            <div class="form-row">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="txt_password"
                           name="txt_password"
                           placeholder="Enter Password"
                           required
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                           title="At least 8 chars with uppercase, lowercase & number"
                           class="artist-reg-input">
                    <span class="show-password-toggle"
                          onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <input type="submit" value="Submit"
                   class="artist-reg-submit-btn">
        </form>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
$("#sel_district").change(function () {
    var did = $(this).val();
    var ur = "{% url 'Guest:AjaxPlace' %}";
    $.ajax({
        url: ur,
        data: { did: did },
        success: function (data) {
            $("#sel_place").html(data);
        }
    });
});

function togglePassword() {
    const pw = document.getElementById("txt_password");
    pw.type = pw.type === "password" ? "text" : "password";
}
</script>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Guest:ArtistRegistration' %}";
</script>
{% endif %}

{% endblock %}
