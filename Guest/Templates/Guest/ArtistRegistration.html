{% extends 'Guest/Header.html' %}
{% block content %}
<head>
    <title>Artist Registration</title>
</head>
<style>
/* ===== FULL PAGE ARTISTIC BACKGROUND ===== */
.artist-reg-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* align to top */
    background: linear-gradient(135deg, #f472b6, #3b82f6, #facc15);
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    padding: 50px 20px;
}

/* ===== REGISTRATION CARD ===== */
.artist-reg-card {
    background: rgba(0,0,0,0.85);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 700px;
    width: 100%;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
    color: #fff;
    position: relative;
}

/* ===== CARD TITLE ===== */
.artist-reg-title {
    text-align: center;
    font-size: 32px;
    margin-bottom: 30px;
    color: #f472b6;
    text-shadow: 0 0 10px #3b82f6;
    font-weight: 700;
}

/* ===== FORM FIELDS ===== */
.artist-reg-input, .artist-reg-textarea, .artist-reg-select {
    width: 100%;
    padding: 12px 14px;
    margin: 10px 0 20px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    transition: all 0.3s;
}

.artist-reg-input:focus, .artist-reg-textarea:focus, .artist-reg-select:focus {
    box-shadow: 0 0 10px #f472b6;
}

/* ===== PASSWORD TOGGLE ===== */
.password-wrapper {
    position: relative;
}

.show-password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #f472b6;
}

/* ===== SUBMIT BUTTON ===== */
.artist-reg-submit-btn {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border-radius: 50px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #0ff, #f0f);
    color: #000;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(0,255,255,0.7);
}

.artist-reg-submit-btn:hover {
    background: linear-gradient(90deg, #f0f, #0ff);
    box-shadow: 0 0 25px rgba(0,255,255,0.9);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .artist-reg-card {
        padding: 30px 20px;
    }
}
</style>

<div class="artist-reg-page">
    <div class="artist-reg-card">
        <h2 class="artist-reg-title">Artist Registration</h2>
        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="text" name="txt_name" placeholder="Name" required title="Name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter" pattern="^[A-Z]+[a-zA-Z ]*$" class="artist-reg-input">
            
            <input type="email" name="txt_email" placeholder="Email" required class="artist-reg-input">
            
            <input type="text" name="txt_contact" placeholder="Contact" required class="artist-reg-input">
            
            <textarea name="txt_address" placeholder="Address" required class="artist-reg-textarea"></textarea>
            
            <select name="sel_district" id="sel_district" required class="artist-reg-select">
                <option value="">-----Select District-----</option>
                {% for i in districtDatas %}
                <option value="{{i.id}}">{{i.district_name}}</option>
                {% endfor %}
            </select>
            
            <select name="sel_place" id="sel_place" required class="artist-reg-select">
                <option value="">-----Select Place-----</option>
            </select>
            
            <input type="file" name="file_photo" accept="image/*" required class="artist-reg-input">
            
            <input type="file" name="file_proof" accept="image/*" required class="artist-reg-input">
            
            <div class="password-wrapper">
                <input type="password" id="txt_password" name="txt_password" placeholder="Password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 characters" class="artist-reg-input">
                <span class="show-password-toggle" onclick="togglePassword()">👁️</span>
            </div>
            
            <input type="submit" value="Submit" class="artist-reg-submit-btn">
        </form>
    </div>
</div>

<!-- jQuery & AJAX -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
$("#sel_district").change(function () {
    var did = $(this).val();
    var ur = "{% url 'Guest:AjaxPlace' %}";
    $.ajax({
        url: ur,
        data: { did: did },
        success: function (data) {
            $("#sel_place").html(data);
        },
    });
});

// Show/Hide Password
function togglePassword() {
    const pwField = document.getElementById('txt_password');
    pwField.type = pwField.type === "password" ? "text" : "password";
}
</script>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Guest:ArtistRegistration' %}"
</script>
{% endif %}

{% endblock %}
