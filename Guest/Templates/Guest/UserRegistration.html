<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
</head>
<body>
    <form action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <table border="1">
            <tr>
                <td>Name</td>
                <td><input required type="text" name="txt_name" title="Name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter" pattern="^[A-Z]+[a-zA-Z ]*$"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" required name="txt_email"></td>
            </tr>
            <tr>
                <td>Contact</td>
                <td><input type="text" required name="txt_contact" pattern="[7-9]{1}[0-9]{9}" 
                title="Phone number with 7-9 and remaing 9 digit with 0-9"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea name="txt_address" id="txt_address" required></textarea></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td><input type="radio" required name="btn_gender" value="Male" />Male
                    <input type="radio" name="btn_gender" value="Female" />Female
                    <input type="radio" name="btn_gender" value="Others" />Others
                </td>
            </tr>
            <tr>
                <td>DOB</td>
                <td><input type="date" name="txt_dob" id="txt_dob" required></td>
            </tr>
            <tr>
                <td>District</td>
                <td><select name="sel_district" id="sel_district" required>
                    <option value="">-----select-----</option>
                    {% for i in districtDatas %}
                    <option value="{{i.id}}">{{i.district_name}}</option>
                    {% endfor %}
                </select></td>
                
            </tr>
            <tr>
                <td>Place</td>
                <td><select name="sel_place" id="sel_place" required>
                <option value="">-----select-----</option>
                </select></td>
            </tr>
            <tr>
                <td>Photo</td>
                <td><input type="file" name="file_photo" id="file_photo" required accept="image/*"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="text" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required name="txt_password"></td>
            </tr>
            <tr>
                <td>Re-Password</td>
                <td><input type="password" required name="txt_repassword"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Sign Up"><input type="submit" value="Cancel"></td>
            </tr>
        </table>
    </form>
    
</body>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Guest:UserRegistration' %}"
</script>
{%  endif %}
</html>

<!-- jQuery & AJAX -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_district").change(function () {
        var did = $(this).val();
        var ur = "{% url 'Guest:AjaxPlace' %}";
        $.ajax({
            url: ur,
            data: { did: did },
            success: function (data) {
                $("#sel_place").html(data);
            },
        });
    });
</script>
