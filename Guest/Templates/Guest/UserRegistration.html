{% extends 'Guest/Header.html' %}
{% block content %}

<head>
    <title>User Registration</title>
</head>

<style>
/* ===== FULL PAGE ===== */
.user-reg-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #3b82f6, #f472b6, #facc15);
    font-family: 'Poppins', sans-serif;
    padding: 40px 20px;
}

/* ===== CARD ===== */
.user-reg-card {
    background: rgba(0,0,0,0.85);
    border-radius: 25px;
    padding: 50px 40px;
    max-width: 750px;
    width: 100%;
    color: #fff;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
}

/* ===== TITLE ===== */
.user-reg-title {
    text-align: center;
    font-size: 36px;
    margin-bottom: 40px;
    color: #f472b6;
    font-weight: 700;
    text-shadow: 0 0 10px #3b82f6;
}

/* ===== FORM ROW ===== */
.form-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
}

/* ===== LABEL ===== */
.form-row label {
    min-width: 160px;
    font-size: 15px;
    font-weight: 500;
    color: #f472b6;
}

/* ===== INPUTS ===== */
.user-reg-input,
.user-reg-textarea,
.user-reg-select {
    flex: 1;
    padding: 14px 16px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

.user-reg-input:focus,
.user-reg-textarea:focus,
.user-reg-select:focus {
    box-shadow: 0 0 10px #f472b6;
}

/* ===== PASSWORD ===== */
.password-wrapper {
    position: relative;
    flex: 1;
}

.password-wrapper input {
    width: 100%;
}

.show-password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #f472b6;
}

/* ===== BUTTONS ===== */
.user-reg-submit-btn {
    width: 45%;
    padding: 14px;
    margin: 10px;
    border-radius: 50px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #0ff, #f0f);
    color: #000;
    box-shadow: 0 0 15px rgba(0,255,255,0.7);
}

.user-reg-submit-btn:hover {
    box-shadow: 0 0 25px rgba(0,255,255,0.9);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
        align-items: flex-start;
    }

    .form-row label {
        margin-bottom: 6px;
    }

    .user-reg-submit-btn {
        width: 100%;
    }
}
</style>

<div class="user-reg-page">
    <div class="user-reg-card">
        <h2 class="user-reg-title">User Registration</h2>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-row">
                <label>Name</label>
                <input type="text" name="txt_name" placeholder="Enter Name"
                       required pattern="^[A-Z]+[a-zA-Z ]*$"
                       class="user-reg-input">
            </div>

            <div class="form-row">
                <label>Email</label>
                <input type="email" name="txt_email"
                       placeholder="Enter Email" required
                       class="user-reg-input">
            </div>

            <div class="form-row">
                <label>Contact</label>
                <input type="text" name="txt_contact"
                       placeholder="Enter Contact Number"
                       required pattern="[7-9]{1}[0-9]{9}"
                       class="user-reg-input">
            </div>

            <div class="form-row">
                <label>Address</label>
                <textarea name="txt_address"
                          placeholder="Enter Address"
                          required class="user-reg-textarea"></textarea>
            </div>

            <div class="form-row">
                <label>District</label>
                <select name="sel_district" id="sel_district"
                        required class="user-reg-select">
                    <option value="">--- Select District ---</option>
                    {% for i in districtDatas %}
                    <option value="{{i.id}}">{{i.district_name}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Place</label>
                <select name="sel_place" id="sel_place"
                        required class="user-reg-select">
                    <option value="">--- Select Place ---</option>
                </select>
            </div>

            <div class="form-row">
                <label>Photo</label>
                <input type="file" name="file_photo"
                       accept="image/*" required
                       class="user-reg-input">
            </div>

            <!-- PASSWORD (FIXED ALIGNMENT) -->
            <div class="form-row">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="txt_password"
                           name="txt_password"
                           placeholder="Enter Password"
                           required
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                           class="user-reg-input">
                    <span class="show-password-toggle"
                          onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <div class="form-row">
                <label>Re-Password</label>
                <input type="password" name="txt_repassword"
                       placeholder="Enter Re-Password"
                       required class="user-reg-input">
            </div>

            <div style="display:flex; justify-content:center;">
                <input type="submit" value="Sign Up"
                       class="user-reg-submit-btn">
                <input type="reset" value="Cancel"
                       class="user-reg-submit-btn">
            </div>

        </form>
    </div>
</div>

<!-- AJAX -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
$("#sel_district").change(function () {
    var did = $(this).val();
    $.ajax({
        url: "{% url 'Guest:AjaxPlace' %}",
        data: { did: did },
        success: function (data) {
            $("#sel_place").html(data);
        }
    });
});

function togglePassword() {
    const pw = document.getElementById("txt_password");
    pw.type = pw.type === "password" ? "text" : "password";
}
</script>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location="{% url 'Guest:UserRegistration' %}";
</script>
{% endif %}

{% endblock %}
