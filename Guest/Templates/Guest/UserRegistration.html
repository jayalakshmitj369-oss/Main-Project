{% extends 'Guest/Header.html' %}
{% block content %}
<head>
    <title>User Registration</title>
</head>
<style>
/* ===== FULL PAGE WRAPPER ===== */
.user-reg-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #3b82f6, #f472b6, #facc15); /* mixed color background */
    font-family: 'Poppins', sans-serif;
    padding: 50px 20px;
}

/* ===== CARD ===== */
.user-reg-card {
    background: rgba(0,0,0,0.85);
    border-radius: 25px;
    padding: 50px 40px;
    max-width: 700px;
    width: 100%;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
    color: #fff;
    position: relative;
}

/* ===== CARD TITLE ===== */
.user-reg-title {
    text-align: center;
    font-size: 36px;
    margin-bottom: 40px;
    color: #f472b6;
    text-shadow: 0 0 10px #3b82f6;
    font-weight: 700;
}

/* ===== FORM FIELDS ===== */
.user-reg-input, .user-reg-textarea, .user-reg-select {
    width: 100%;
    padding: 14px 16px;
    margin: 12px 0 20px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    transition: all 0.3s;
}

.user-reg-input:focus, .user-reg-textarea:focus, .user-reg-select:focus {
    box-shadow: 0 0 10px #f472b6;
}

/* ===== RADIO BUTTONS ===== */
.user-reg-radio-group input[type="radio"] {
    margin-right: 6px;
}

/* ===== PASSWORD WRAPPER ===== */
.password-wrapper {
    position: relative;
}

.show-password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #f472b6;
}

/* ===== SUBMIT BUTTONS ===== */
.user-reg-submit-btn {
    width: 48%;
    padding: 14px;
    margin: 10px 1%;
    border-radius: 50px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, #0ff, #f0f);
    color: #000;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(0,255,255,0.7);
}

.user-reg-submit-btn:hover {
    background: linear-gradient(90deg, #f0f, #0ff);
    box-shadow: 0 0 25px rgba(0,255,255,0.9);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .user-reg-card {
        padding: 30px 20px;
    }

    .user-reg-submit-btn {
        width: 100%;
        margin: 10px 0;
    }
}
</style>

<div class="user-reg-page">
    <div class="user-reg-card">
        <h2 class="user-reg-title">User Registration</h2>
        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="text" name="txt_name" placeholder="Name" required title="Name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter" pattern="^[A-Z]+[a-zA-Z ]*$" class="user-reg-input">
            
            <input type="email" name="txt_email" placeholder="Email" required class="user-reg-input">
            
            <input type="text" name="txt_contact" placeholder="Contact" required pattern="[7-9]{1}[0-9]{9}" title="Phone number with 7-9 and remaining 9 digits" class="user-reg-input">
            
            <textarea name="txt_address" placeholder="Address" required class="user-reg-textarea"></textarea>
            
            <!-- <div class="user-reg-radio-group">
                Gender: 
                <input type="radio" name="btn_gender" value="Male" required> Male
                <input type="radio" name="btn_gender" value="Female"> Female
                <input type="radio" name="btn_gender" value="Others"> Others
            </div> -->
            
            <!-- <input type="date" name="txt_dob" required class="user-reg-input"> -->
            
            <select name="sel_district" id="sel_district" required class="user-reg-select">
                <option value="">-----Select District-----</option>
                {% for i in districtDatas %}
                <option value="{{i.id}}">{{i.district_name}}</option>
                {% endfor %}
            </select>
            
            <select name="sel_place" id="sel_place" required class="user-reg-select">
                <option value="">-----Select Place-----</option>
            </select>
            
            <input type="file" name="file_photo" accept="image/*" required class="user-reg-input">
            
            <div class="password-wrapper">
                <input type="password" id="txt_password" name="txt_password" placeholder="Password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number, one uppercase and lowercase letter, and at least 8 characters" class="user-reg-input">
                <span class="show-password-toggle" onclick="togglePassword()">👁️</span>
            </div>
            
            <input type="password" name="txt_repassword" placeholder="Re-Password" required class="user-reg-input">
            
            <div style="display: flex; justify-content: center;">
                <input type="submit" value="Sign Up" class="user-reg-submit-btn">
                <input type="reset" value="Cancel" class="user-reg-submit-btn">
            </div>
        </form>
    </div>
</div>

<!-- jQuery & AJAX -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
$("#sel_district").change(function () {
    var did = $(this).val();
    var ur = "{% url 'Guest:AjaxPlace' %}";
    $.ajax({
        url: ur,
        data: { did: did },
        success: function (data) {
            $("#sel_place").html(data);
        },
    });
});

// Show/Hide password
function togglePassword() {
    const pwField = document.getElementById('txt_password');
    pwField.type = pwField.type === "password" ? "text" : "password";
}
</script>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Guest:UserRegistration' %}"
</script>
{% endif %}

{% endblock %}
