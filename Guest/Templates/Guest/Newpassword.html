{% load static %}
{% block content %}
<head>
    <title>Reset Password</title>
</head>

<style>
/* ===== FULL PAGE BACKGROUND ===== */
.artist-reset-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f472b6, #3b82f6);
    font-family: 'Poppins', sans-serif;
    padding: 20px;
}

/* ===== CARD ===== */
.artist-reset-card {
    background: rgba(0, 0, 0, 0.85);
    padding: 50px 40px;
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 0 50px rgba(0,0,0,0.7);
    text-align: center;
    color: #fff;
}

/* ===== TITLE ===== */
.artist-reset-title {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #f472b6;
    text-shadow: 0 0 15px rgba(244,114,182,0.6);
}

/* ===== SUBTEXT ===== */
.artist-reset-subtitle {
    font-size: 14px;
    color: #c7d2fe;
    margin-bottom: 30px;
}

/* ===== INPUT ===== */
.artist-reset-input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

/* ===== BUTTON ===== */
.artist-reset-btn {
    width: 100%;
    padding: 14px;
    background: #f472b6;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

.artist-reset-btn:hover {
    background: #e11d48;
}
</style>

<div class="artist-reset-page">
    <div class="artist-reset-card">
        <h1 class="artist-reset-title">Set New Password</h1>
        <p class="artist-reset-subtitle">
            Enter and confirm your new password
        </p>

        <form action="" method="post">
            {% csrf_token %}
            <input type="password" name="txt_new_pass" placeholder="Enter New Password" required
                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                       title="At least one number, one uppercase, one lowercase, minimum 8 characters" class="artist-reset-input">
            <input type="password" name="txt_con_pass" placeholder="Enter Confirm Password" required class="artist-reset-input">
            <input type="submit" value="Update Password" class="artist-reset-btn">
        </form>
    </div>
</div>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location = "{% url 'Guest:Login' %}";
</script>
{% endif %}

{% if msg1 %}
<script>
    alert("{{ msg1 }}");
    window.location = "{% url 'Guest:Login' %}";
</script>
{% endif %}

{% endblock %}
