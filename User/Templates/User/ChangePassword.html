{% extends 'Artist/Header.html' %}
{% block content %}
<head>
    <title>Change Password</title>
</head>
<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow-x: hidden;
    font-family: 'Poppins', sans-serif;
}

/* ===== FULL PAGE WRAPPER ===== */
.artist-changepwd-page {
    width: 100vw;
    min-height: 100vh;
    margin-left: calc(-50vw + 50%);
    padding: 110px 20px;
    background: #000;
    position: relative;
    color: #fff;
}

/* ===== GLOW BACKGROUND ===== */
.artist-changepwd-page::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at top left, rgba(0,255,255,0.15), transparent 45%),
        radial-gradient(circle at bottom right, rgba(255,0,255,0.15), transparent 45%);
    z-index: 0;
    pointer-events: none;
}

/* ===== CARD ===== */
.artist-changepwd-card {
    max-width: 500px;
    margin: auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 45px 40px;
    box-shadow: 0 0 45px rgba(0,255,255,0.25);
    position: relative;
    z-index: 1;
}

/* ===== TITLE ===== */
.artist-changepwd-title {
    text-align: center;
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 35px;
}

/* ===== FORM ===== */
.artist-changepwd-form {
    display: flex;
    flex-direction: column;
    gap: 22px;
}

.artist-changepwd-group {
    position: relative; /* for eye icon */
}

.artist-changepwd-group label {
    font-size: 14px;
    opacity: 0.85;
}

.artist-changepwd-group input {
    width: 100%;
    padding: 12px 40px 12px 15px; /* extra space for icon */
    background: #000;
    border: 1px solid #555;
    border-radius: 14px;
    color: #fff;
    outline: none;
}

.artist-changepwd-group input:focus {
    border-color: #0ff;
    box-shadow: 0 0 12px rgba(0,255,255,0.5);
}

/* ===== EYE ICON ===== */
.eye-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #0ff;
    font-size: 18px;
    user-select: none;
}

/* ===== BUTTONS ===== */
.artist-changepwd-actions {
    display: flex;
    gap: 15px;
    margin-top: 15px;
}

.artist-changepwd-btn {
    flex: 1;
    padding: 14px;
    border-radius: 30px;
    border: none;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.4s;
}

.artist-changepwd-btn-save {
    background: linear-gradient(45deg, #00ffff, #ff00ff);
    color: #000;
}

.artist-changepwd-btn-save:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0,255,255,0.6);
}

.artist-changepwd-btn-cancel {
    background: transparent;
    color: #fff;
    border: 1px solid #777;
}

.artist-changepwd-btn-cancel:hover {
    background: #222;
}
</style>

<div class="artist-changepwd-page">
    <div class="artist-changepwd-card">

        <h2 class="artist-changepwd-title">🔒 Change Password</h2>

        <form method="post" class="artist-changepwd-form">
            {% csrf_token %}

            <div class="artist-changepwd-group">
                <label>Old Password</label>
                <input type="password" id="oldPassword" name="txt_oldpassword" required
                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                       title="At least one number, one uppercase, one lowercase, minimum 8 characters">
                <span class="eye-toggle" onclick="togglePassword('oldPassword')">👁️</span>
            </div>

            <div class="artist-changepwd-group">
                <label>New Password</label>
                <input type="password" id="newPassword" name="txt_newpassword" required
                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                       title="At least one number, one uppercase, one lowercase, minimum 8 characters">
                <span class="eye-toggle" onclick="togglePassword('newPassword')">👁️</span>
            </div>

            <div class="artist-changepwd-group">
                <label>Re-Type Password</label>
                <input type="password" id="retypePassword" name="txt_retypepassword" required>
                <span class="eye-toggle" onclick="togglePassword('retypePassword')">👁️</span>
            </div>

            <div class="artist-changepwd-actions">
                <button type="submit" class="artist-changepwd-btn artist-changepwd-btn-save">
                    Change Password
                </button>
                <a href="{% url 'Artist:MyProfile' %}" class="artist-changepwd-btn artist-changepwd-btn-cancel"
                   style="text-align:center; text-decoration:none; line-height:40px;">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

<script>
function togglePassword(fieldId) {
    const pwField = document.getElementById(fieldId);
    const icon = pwField.nextElementSibling;
    if (pwField.type === "password") {
        pwField.type = "text";
        icon.textContent = "🙈";
    } else {
        pwField.type = "password";
        icon.textContent = "👁️";
    }
}
</script>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Artist:MyProfile' %}";
</script>
{% endif %}

{% endblock %}
