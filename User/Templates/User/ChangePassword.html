{% extends 'User/Header.html' %}
{% block content %}

<style>
/* ===== BREAK CONTAINER WIDTH ===== */
.full-width-password {
    width: 100vw;
    margin-left: calc(-50vw + 50%);
}

/* ===== FULL ART BACKGROUND ===== */
.password-art-wrapper {
    min-height: 100vh;
    width: 100%;
    padding: 100px 20px;

    display: flex;
    justify-content: center;
    align-items: center;

    background:
        radial-gradient(circle at 0% 40%, rgba(255, 0, 150, 0.3), transparent 45%),
        radial-gradient(circle at 100% 60%, rgba(0, 255, 255, 0.3), transparent 45%),
        radial-gradient(circle at 50% 90%, rgba(255, 215, 0, 0.25), transparent 55%),
        linear-gradient(180deg, #0a0a0a, #0a0a0a);
}

/* ===== PASSWORD CARD ===== */
.password-art-card {
    width: 100%;
    max-width: 460px;
    padding: 40px 35px;
    border-radius: 26px;

    background: linear-gradient(145deg, #0b0b0b, #151515);
    box-shadow:
        0 30px 60px rgba(0,0,0,0.75),
        0 0 45px rgba(255,0,150,0.18),
        0 0 45px rgba(0,255,255,0.18);

    position: relative;
    overflow: hidden;
}

/* glow paint */
.password-art-card::before {
    content: "";
    position: absolute;
    bottom: -70px;
    right: -70px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, #00ffff, transparent 70%);
    opacity: 0.35;
    border-radius: 50%;
}

/* title */
.password-art-title {
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 35px;
}

/* form */
.password-art-form {
    display: flex;
    flex-direction: column;
    gap: 22px;
}

.password-art-group label {
    color: #dddddd;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
}

.password-art-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ffffff;

    outline: none;
    font-size: 14px;
}

.password-art-group input:focus {
    border-color: #ff0096;
    box-shadow: 0 0 0 2px rgba(255,0,150,0.35);
}

/* buttons */
.password-art-actions {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin-top: 30px;
}

.password-art-btn {
    flex: 1;
    padding: 14px;
    border-radius: 999px;
    border: none;

    font-weight: 700;
    font-size: 14px;
    cursor: pointer;

    background: linear-gradient(135deg, #ff0096, #00ffff);
    color: #000;

    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.password-art-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(255,0,150,0.45);
}

.password-art-btn.cancel {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
}
</style>

<!-- 🔥 FULL WIDTH FIX -->
<div class="full-width-password">
    <div class="password-art-wrapper">

        <div class="password-art-card">

            <div class="password-art-title">
                Change Password
            </div>

            <form method="POST" class="password-art-form">
                {% csrf_token %}

                <div class="password-art-group">
                    <label>Old Password</label>
                    <input type="password" name="txt_oldpassword" required
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                           title="Must contain at least one number, one uppercase, one lowercase letter, and 8 characters">
                </div>

                <div class="password-art-group">
                    <label>New Password</label>
                    <input type="password" name="txt_newpassword" required
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}">
                </div>

                <div class="password-art-group">
                    <label>Re-Type Password</label>
                    <input type="password" name="txt_retypepassword" required>
                </div>

                <div class="password-art-actions">
                    <button type="submit" class="password-art-btn">
                        Change Password
                    </button>
                    <a href="{% url 'User:MyProfile' %}" class="password-art-btn cancel" style="text-align:center;text-decoration:none;">
                        Cancel
                    </a>
                </div>

            </form>

        </div>

    </div>
</div>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location = "{% url 'User:MyProfile' %}";
</script>
{% endif %}

{% endblock %}
