<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Request</title>
</head>
<body>
    <form action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <table border="2">
            <tr>
                <td>Details</td>
                <td><textarea name="txt_details" id="txt_details" required></textarea></td>
            </tr>
            <tr>
                <td>File</td>
                <td><input type="file" name="file_name" id="file_name" required accept="image/*"></td>
            </tr>
            <tr>
                <td>Art Type</td>
                <td><select name="sel_arttype" id="sel_arttype" required>
                    <option value="">-----select-----</option>
                    {% for i in arttypeData %}
                    <option value="{{i.id}}">{{i.arttype_name}}</option>
                    {% endfor %}
                </select></td>
            </tr>
            <tr>
                <td>Art Subtype</td>
                <td><select name="sel_artsubtype" id="sel_artsubtype" required>
                    <option value="">-----select-----</option>
                </select></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Submit"></td>
            </tr>
        </table>
    </form>
    
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'User:ViewArtwork' %}"
</script>
{% endif %}



<!-- jQuery & AJAX -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_arttype").change(function () {
        var did = $(this).val();
        var ur = "{% url 'Artist:AjaxSubtype' %}";
        $.ajax({
            url: ur,
            data: { did: did },
            success: function (data) {
                $("#sel_artsubtype").html(data);
            },
        });
    });
</script>
