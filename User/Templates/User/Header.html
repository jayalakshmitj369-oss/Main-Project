{% load static %}
<!DOCTYPE html>
<html lang="en" class="no-js">

<head>


    <!--- basic page needs
    ================================================== -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lounge</title>

    <script>
        document.documentElement.classList.remove('no-js');
        document.documentElement.classList.add('js');
    </script>

    <!-- CSS
    ================================================== -->
    <link rel="stylesheet" href="{% static 'Main/css/vendor.css' %}">
    <link rel="stylesheet" href="{% static 'Main/css/styles.css' %}">

    <!-- favicons
    ================================================== -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'Main/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'Main/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'Main/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'Main/site.webmanifest' %}">

</head>

<style>
    .artifika-regular {
        font-family: "Artifika", serif;
        font-weight: 400;
        font-style: normal;
    }
</style>



<body id="top">

    <!-- preloader
    ================================================== -->
    <div id="preloader">
        <div id="loader" class="dots-fade">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <!-- page wrap
    ================================================== -->
    <div id="page" class="">


        <!-- # site header 
        ================================================== -->
        <header class="s-header">

            <div class="container s-header__content">

                <div class="s-header__block">
                    <div class="header-logo">
                        <a class="logo" href="index.html">
                            <h1 class="artifika-regular" style="font-size: 25px;">ART HIVE</h1>
                        </a>
                    </div>
                    <a class="header-menu-toggle" href="#0"><span>Menu</span></a>
                </div> <!-- end s-header__block -->

                <nav class="header-nav">
                    <ul class="header-nav__links">
                        <li class="current"><a class="" href="{% url 'User:HomePage' %}">Home</a></li>
                        <li><a class="" href="{% url 'User:ViewArtwork' %}">View Artwork</a></li>
                        <li><a class="" href="{% url 'User:MyProfile' %}">My Profile</a></li>
                        <li><a class="" href="{% url 'User:MyCustomRequest' %}">My CustomRequest</a></li>
                        <li><a class="" href="{% url 'User:MyBooking' %}">My Booking</a></li>
                        <li><a class="" href="{% url 'User:Feedback' %}">FeedBack</a></li>
                        <li><a class="" href="{% url 'User:Complaint' %}">Complaint</a></li>
                        <li><a class="" href="">Logout</a></li>
                    </ul> <!-- end header-nav__links -->

            </div> <!-- end header-contact -->
            </nav> <!-- end header-nav -->

    </div> <!-- end s-header__content -->

    </header> <!-- end s-header -->


    <!-- # intro
        ================================================== -->
    <section id="about" class="container s-about target-section">
        {% block content %}
        {% endblock %}

    </section>



    


    <!-- Java Script
    ================================================== -->
    <script src="{% static 'Main/js/plugins.js' %}"></script>
    <script src="{% static 'Main/js/main.js' %}"></script>

</body>

</html>
