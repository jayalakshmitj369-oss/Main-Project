{% extends 'User/Header.html' %}
{% block content %}

<style>
/* ===== BREAK HEADER CONTAINER ===== */
.full-width-gallery {
    width: 100vw;
    margin-left: calc(-50vw + 50%);
}

/* ===== PAGE BACKGROUND ===== */
.gallery-page {
    min-height: 100vh;
    padding: 90px 30px;

    background:
        radial-gradient(circle at 15% 30%, rgba(255,0,150,0.35), transparent 45%),
        radial-gradient(circle at 85% 70%, rgba(0,255,255,0.35), transparent 45%),
        linear-gradient(180deg, #050505, #0b0b0b);
}

/* ===== TITLE ===== */
.gallery-title {
    text-align: center;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #ffffff;
    margin-bottom: 60px;
}

/* ===== GRID ===== */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 35px;
    max-width: 1300px;
    margin: auto;
}

/* ===== ART CARD ===== */
.gallery-card {
    position: relative;
    border-radius: 20px;
    overflow: hidden;

    background: linear-gradient(145deg, #111, #1a1a1a);
    box-shadow:
        0 20px 45px rgba(0,0,0,0.7),
        0 0 30px rgba(255,0,150,0.2),
        0 0 30px rgba(0,255,255,0.2);

    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.gallery-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow:
        0 30px 60px rgba(0,0,0,0.85),
        0 0 45px rgba(255,0,150,0.45),
        0 0 45px rgba(0,255,255,0.45);
}

/* IMAGE */
.gallery-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
}

/* NUMBER BADGE */
.gallery-badge {
    position: absolute;
    top: 14px;
    left: 14px;

    background: linear-gradient(135deg, #ff0096, #00ffff);
    color: #000;
    font-weight: 800;
    font-size: 13px;

    padding: 6px 12px;
    border-radius: 999px;
}

/* HOVER OVERLAY */
.gallery-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to top,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.1)
    );

    opacity: 0;
    display: flex;
    align-items: flex-end;
    padding: 20px;

    transition: opacity 0.4s ease;
}

.gallery-card:hover .gallery-overlay {
    opacity: 1;
}

.gallery-overlay span {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
}
</style>

<div class="full-width-gallery">
    <div class="gallery-page">

        <div class="gallery-title">
            Art Gallery
        </div>

        <div class="gallery-grid">
            {% for i in viewgalleryData %}
            <div class="gallery-card">
                <span class="gallery-badge">
                    {{ forloop.counter }}
                </span>

                <img src="{{ i.gallery_file.url }}" alt="Artwork">

                <div class="gallery-overlay">
                    <span>Artwork Preview</span>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>
</div>

{% endblock %}
