{% extends 'User/Header.html' %}
{% block content %}
<head>
    <title>Feedback</title>
</head>
<style>
/* ===== Force full black theme everywhere ===== */
body, html {
    background-color: #000 !important;
    margin: 0;
    padding: 0;
}

/* ===== Full-page wrapper ===== */
.user-feedback-wrapper {
    min-height: 100vh;
    width: 100%;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== Animated neon background shapes ===== */
.user-feedback-shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.35;
    filter: blur(10px);
    animation: floatAnim 14s infinite ease-in-out;
    pointer-events: none;
}

.user-feedback-shape.one {
    width: 320px;
    height: 320px;
    background: #00ffff;
    top: -80px;
    left: -80px;
}

.user-feedback-shape.two {
    width: 260px;
    height: 260px;
    background: #ff00ff;
    bottom: -100px;
    right: -100px;
    animation-delay: 5s;
}

.user-feedback-shape.three {
    width: 180px;
    height: 180px;
    background: #00ff99;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: 9s;
}

@keyframes floatAnim {
    0% { transform: translate(0,0); }
    50% { transform: translate(40px,-40px); }
    100% { transform: translate(0,0); }
}

/* ===== Feedback card ===== */
.user-feedback-card {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 600px;
    background: #0b0b0b;
    border-radius: 26px;
    padding: 55px 45px;
    box-shadow: 0 0 40px rgba(0,255,255,0.35);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
}

/* ===== Heading ===== */
.user-feedback-title {
    text-align: center;
    font-size: 2.6rem;
    font-weight: 700;
    margin-bottom: 35px;
    color: #00ffff;
    text-shadow: 0 0 18px #00ffff;
}

/* ===== Textarea ===== */
.user-feedback-textarea {
    width: 100%;
    height: 160px;
    background: #000;
    color: #00ffff;
    border: 1px solid #00ffff;
    border-radius: 16px;
    padding: 18px;
    font-size: 16px;
    resize: none;
    transition: 0.3s;
}

.user-feedback-textarea::placeholder {
    color: #666;
}

.user-feedback-textarea:focus {
    outline: none;
    box-shadow: 0 0 18px #00ffff;
}

/* ===== Submit button ===== */
.user-feedback-submit {
    width: 100%;
    margin-top: 25px;
    padding: 15px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(90deg, #00ffff, #ff00ff);
    color: #000;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 30px rgba(0,255,255,0.8);
}

.user-feedback-submit:hover {
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    box-shadow: 0 0 45px rgba(0,255,255,1);
}

.user-feedback-submit:active {
    transform: scale(0.97);
}

/* ===== Responsive ===== */
@media (max-width: 576px) {
    .user-feedback-card {
        padding: 40px 25px;
    }
    .user-feedback-title {
        font-size: 2.1rem;
    }
}
</style>

<div class="user-feedback-wrapper">

    <!-- Neon shapes -->
    <div class="user-feedback-shape one"></div>
    <div class="user-feedback-shape two"></div>
    <div class="user-feedback-shape three"></div>

    <!-- Feedback form -->
    <div class="user-feedback-card">
        <div class="user-feedback-title">Feedback</div>

        <form method="POST">
            {% csrf_token %}
            <textarea
                class="user-feedback-textarea"
                name="txt_feedback"
                placeholder="Share your thoughts with us..."
                required></textarea>

            <input type="submit" value="Submit Feedback" class="user-feedback-submit">
        </form>
    </div>

</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'User:Feedback' %}";
</script>
{% endif %}

{% endblock %}
