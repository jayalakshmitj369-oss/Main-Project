{% extends 'User/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<!-- Bootstrap CDN -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

<style>
/* Full-page wrapper with pure black background */
.feedback-fullpage-wrapper {
    min-height: 100vh;
    width: 100%;
    background-color: #000; /* solid black background */
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* Glowing animated shapes in background */
.feedback-bg-shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
    animation: float 12s infinite;
    pointer-events: none;
}

.feedback-bg-shape.shape1 { width: 300px; height: 300px; background: #0f0; top: -50px; left: -50px; animation-delay: 0s;}
.feedback-bg-shape.shape2 { width: 200px; height: 200px; background: #00f; bottom: -30px; right: -30px; animation-delay: 4s;}
.feedback-bg-shape.shape3 { width: 150px; height: 150px; background: #f0f; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 8s; }

@keyframes float {
    0% { transform: translateY(0px) translateX(0px); }
    50% { transform: translateY(-50px) translateX(50px); }
    100% { transform: translateY(0px) translateX(0px); }
}

/* Feedback content wrapper */
.feedback-fullpage-content {
    z-index: 2;
    max-width: 600px;
    width: 90%;
    background-color: #111; /* very dark grey instead of white */
    border-radius: 25px;
    padding: 50px 40px;
    box-shadow: 0 0 30px rgba(255, 0, 255, 0.4); /* neon-ish glow */
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    position: relative;
}

/* Header */
.feedback-fullpage-content h2 {
    text-align: center;
    font-size: 2.5rem;
    font-weight: bold;
    margin-bottom: 40px;
    color: #0ff;
    text-shadow: 0 0 15px #0ff;
}

/* Textarea styling */
.feedback-textarea {
    width: 100%;
    height: 150px;
    background: #000; /* black background */
    color: #0ff; /* neon cyan text */
    border: 1px solid #0ff;
    border-radius: 15px;
    padding: 20px;
    font-size: 16px;
    resize: none;
    transition: all 0.3s;
}

.feedback-textarea::placeholder {
    color: #555;
}

.feedback-textarea:focus {
    outline: none;
    border-color: #0ff;
    box-shadow: 0 0 15px #0ff;
}

/* Submit button */
.feedback-submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(90deg, #0ff, #f0f);
    color: #000; /* black text on neon gradient */
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
}

.feedback-submit-btn:hover {
    background: linear-gradient(90deg, #f0f, #0ff);
    box-shadow: 0 0 35px rgba(0, 255, 255, 0.9);
}

.feedback-submit-btn:active {
    transform: scale(0.98);
}
</style>
</head>
<body>

<div class="feedback-fullpage-wrapper">
    <!-- Background shapes -->
    <div class="feedback-bg-shape shape1"></div>
    <div class="feedback-bg-shape shape2"></div>
    <div class="feedback-bg-shape shape3"></div>

    <!-- Feedback form content -->
    <div class="feedback-fullpage-content">
        <h2>We Value Your Feedback</h2>
        <form method="POST">
            {% csrf_token %}
            <textarea class="feedback-textarea" name="txt_feedback" id="txt_feedback" placeholder="Type your feedback here..." required></textarea>
            <input type="submit" class="feedback-submit-btn" value="Submit">
        </form>
    </div>
</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'User:Feedback' %}";
</script>
{% endif %}

</body>
</html>

{% endblock %}
