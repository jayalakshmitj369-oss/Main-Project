{% extends 'Artist/Header.html' %}
{% block content %}

<style>
/* ===== FULL PAGE ROSE-BLUE ARTISTIC BACKGROUND ===== */
.feedback-page {
    min-height: 100vh;
    padding: 100px 40px;
    background: 
        radial-gradient(circle at top left, #f472b6aa, transparent 40%),
        radial-gradient(circle at bottom right, #3b82f6aa, transparent 40%),
        linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

/* ===== PAGE TITLE ===== */
.feedback-title {
    text-align: center;
    font-size: 40px;
    font-weight: 700;
    margin-bottom: 60px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
    color: #f472b6; /* rose color for title */
}

/* ===== FEEDBACK FORM ===== */
.feedback-form {
    max-width: 700px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.08);
    padding: 50px 35px;
    border-radius: 25px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    border: 2px solid rgba(255,255,255,0.1);
    animation: floatForm 1s ease forwards;
}

/* Floating effect */
@keyframes floatForm {
    0% { transform: translateY(30px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

.feedback-form textarea {
    width: 100%;
    padding: 20px;
    border-radius: 20px;
    border: none;
    resize: vertical;
    background: rgba(255,255,255,0.12);
    color: #f8fafc;
    font-size: 16px;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s ease;
}

.feedback-form textarea:focus {
    background: rgba(255,255,255,0.2);
    outline: none;
}

/* Submit Button */
.feedback-form input[type="submit"] {
    margin-top: 30px;
    padding: 15px 40px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #f472b6, #3b82f6);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.feedback-form input[type="submit"]:hover {
    opacity: 0.95;
    transform: translateY(-3px);
}

/* Placeholder style */
.feedback-form textarea::placeholder {
    color: rgba(255,255,255,0.7);
    font-style: italic;
}
</style>

<div class="feedback-page">
    <h2 class="feedback-title">We Value Your Feedback</h2>

    <form action="" method="POST" class="feedback-form">
        {% csrf_token %}
        <textarea name="txt_feedback" id="txt_feedback" rows="6" placeholder="Type your feedback here..." required></textarea>
        <input type="submit" value="Submit">
    </form>
</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Artist:Feedback' %}";
</script>
{% endif %}

{% endblock %}
