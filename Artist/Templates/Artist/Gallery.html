{% extends 'Artist/Header.html' %}
{% block content %}

<style>
/* ===== FULL PAGE WRAPPER ===== */
.gallery-page-wrapper {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #071a2f, #000814);
    padding: 40px;
}

/* ===== GLASS CARD ===== */
.gallery-card {
    width: 420px;
    background: rgba(5, 15, 35, 0.9);
    border-radius: 16px;
    padding: 35px 30px;
    border: 1px solid rgba(0, 180, 255, 0.4);
    box-shadow:
        0 0 30px rgba(0, 180, 255, 0.35),
        inset 0 0 20px rgba(0, 180, 255, 0.08);
    text-align: center;
}

/* ===== TITLE ===== */
.gallery-card h2 {
    color: #00c8ff;
    font-size: 26px;
    margin-bottom: 10px;
    text-shadow: 0 0 12px rgba(0, 200, 255, 0.9);
}

.gallery-card p {
    font-size: 14px;
    color: #cdeaff;
    margin-bottom: 30px;
}

/* ===== FILE INPUT ===== */
.file-input-box {
    border: 2px dashed rgba(0, 180, 255, 0.6);
    border-radius: 12px;
    padding: 30px 15px;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(0, 0, 0, 0.35);
}

.file-input-box:hover {
    border-color: #00eaff;
    box-shadow: 0 0 20px rgba(0, 230, 255, 0.6);
}

.file-input-box input {
    display: none;
}

.file-input-box label {
    display: block;
    color: #8fdcff;
    font-size: 15px;
    cursor: pointer;
}

.file-input-box span {
    display: block;
    margin-top: 8px;
    font-size: 13px;
    color: #9fbfff;
}

/* ===== BUTTON ===== */
.submit-btn {
    width: 100%;
    margin-top: 30px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
    transition: 0.3s;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0, 220, 255, 1);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    .gallery-card {
        width: 100%;
    }
}
</style>

<div class="gallery-page-wrapper">

    <div class="gallery-card">
        <h2>Upload Artwork</h2>
        <p>Add your artwork to the gallery</p>

        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="file-input-box">
                <label for="file_name">
                    Click to choose an image
                    <span>JPG, PNG, JPEG supported</span>
                </label>
                <input type="file" name="file_name" id="file_name" required accept="image/*">
            </div>

            <input type="submit" value="Upload Artwork" class="submit-btn">
        </form>
    </div>

</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Artist:Artwork' %}";
</script>
{% endif %}

{% endblock %}
