<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
</head>
<body>
    <form action="" method="POST">
        {% csrf_token %}
        <table border="2">
            <tr>
                <td colspan="2"><img src="{{artist.artist_photo.url}}" width="150" alt="" ></td>
            </tr>
            <tr>
                <td>Name</td>
                <td>{{artist.artist_name}}</td>
            </tr>
            <tr>
                <td>Email</td>
                <td>{{artist.artist_email}}</td>
            </tr>
            <tr>
                <td>Contact</td>
                <td>{{artist.artist_contact}}</td>
            </tr>
            <tr>
                <td>Address</td>
                <td>{{artist.artist_address}}</td>
            </tr>
            <tr>
                <td>District</td>
                <td>{{artist.place.district.district_name}}</td>
            </tr>
            <tr>
                <td>Place</td>
                <td>{{artist.place.place_name}}</td>
            </tr>
            <tr>
                <td colspan="2" align="=center"><a href="{% url 'Artist:EditProfile' %}">Edit Profile</a> | <a href="{% url 'Artist:ChangePassword' %}">Change Password</a></td>
            </tr>
        </table>
    </form>
    
</body>
</html>
