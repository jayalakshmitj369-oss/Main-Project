{% extends 'Artist/Header.html' %}
{% block content %}
<head>
    <title>Artwork</title>
</head>
<style>
/* ===== GLOBAL SCROLL FIX ===== */
html, body {
    height: 100%;
    margin: 0;
    overflow-x: hidden;
    overflow-y: auto;
    background: #000;
    scroll-behavior: smooth;
}

/* ===== FULL PAGE WRAPPER ===== */
.artist-artwork-page {
    width: 100vw;
    min-height: 100vh;
    margin-left: calc(-50vw + 50%);
    padding: 90px 30px;
    background: #000;
    color: #fff;
    position: relative;
    overflow-y: auto;
}

/* ===== BACKGROUND GLOW ===== */
.artist-artwork-page::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at top left, rgba(0,255,255,0.15), transparent 45%),
        radial-gradient(circle at bottom right, rgba(255,0,255,0.15), transparent 45%);
    z-index: 0;
    pointer-events: none;
}

/* ===== CONTENT CARD ===== */
.artist-artwork-card {
    max-width: 1300px;
    margin: auto;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

/* ===== PAGE TITLE ===== */
.artist-artwork-title {
    text-align: center;
    font-size: 34px;
    letter-spacing: 2px;
    margin-bottom: 35px;
}

/* ===== FORM ===== */
.artist-artwork-form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.artist-artwork-form label {
    font-size: 14px;
    opacity: 0.8;
}

.artist-artwork-form input,
.artist-artwork-form textarea,
.artist-artwork-form select {
    width: 100%;
    padding: 12px;
    background: #000;
    border: 1px solid #555;
    border-radius: 10px;
    color: #fff;
}

.artist-artwork-form textarea {
    grid-column: 1 / -1;
    min-height: 100px;
}

.artist-artwork-btn {
    grid-column: 1 / -1;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #00ffff, #ff00ff);
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

/* ===== ARTWORK LIST ===== */
.artist-artwork-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

/* ===== ARTWORK CARD ===== */
.artist-artwork-item {
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    overflow: hidden;
    transition: 0.4s;
}

.artist-artwork-item:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

.artist-artwork-item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.artist-artwork-info {
    padding: 15px;
}

.artist-artwork-info h4 {
    margin: 0 0 8px;
}

.artist-artwork-actions a {
    display: inline-block;
    margin-top: 10px;
    color: #0ff;
    text-decoration: none;
    font-size: 14px;
}
</style>

<div class="artist-artwork-page">
    <div class="artist-artwork-card">

        <h2 class="artist-artwork-title">🎨 My Artworks</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="artist-artwork-form">
                <div>
                    <label>Title</label>
                    <input type="text" name="txt_title">
                </div>
                <div>
                    <label>Photo</label>
                    <input type="file" name="file_photo">
                </div>
                <div>
                    <label>Price</label>
                    <input type="text" name="txt_price">
                </div>
                <div>
                    <label>Art Type</label>
                    <select name="sel_arttype" id="sel_arttype">
                        <option value="">Select</option>
                        {% for i in arttypeData %}
                        <option value="{{i.id}}">{{i.arttype_name}}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label>Art Subtype</label>
                    <select name="sel_artsubtype" id="sel_artsubtype"></select>
                </div>
                <div>
                    <label>Details</label>
                    <textarea name="txt_details"></textarea>
                </div>
                <button class="artist-artwork-btn">Upload Artwork</button>
            </div>
        </form>

        <div class="artist-artwork-grid">
            {% for i in artworkData %}
            <div class="artist-artwork-item">
                <img src="{{i.artwork_photo.url}}">
                <div class="artist-artwork-info">
                    <h4>{{i.artwork_title}}</h4>
                    <p>₹{{i.artwork_price}}</p>
                    <div class="artist-artwork-actions">
                        <a href="{% url 'Artist:DeleteArtwork' i.id %}">Delete</a> |
                        <a href="{% url 'Artist:GalleryArtwork' i.id %}">Gallery</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
$("#sel_arttype").change(function () {
    $.ajax({
        url: "{% url 'Artist:AjaxSubtype' %}",
        data: { did: $(this).val() },
        success: function (data) {
            $("#sel_artsubtype").html(data);
        }
    });
});
</script>

{% endblock %}
